<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | AI Study Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f4f7f8; --card-bg: #ffffff; --text-main: #1e293b; --text-muted: #64748b;
            --primary-green: #15803d; --primary-green-hover: #14532d; --primary-green-light: #dcfce7; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        .auth-body { background-color: var(--bg-color); display: flex; align-items: center; justify-content: center; min-height: 100vh; color: var(--text-main); }
        .auth-card { background: var(--card-bg); padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 100%; max-width: 420px; }
        .logo-center { text-align: center; color: var(--primary-green); font-size: 1.8rem; font-weight: 700; margin-bottom: 20px; }
        .auth-card h2 { text-align: center; margin-bottom: 5px; font-size: 1.5rem; }
        .auth-subtitle { text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 0.95rem; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-size: 0.95rem; color: var(--text-main); transition: border-color 0.2s; background-color: #ffffff; }
        .input-group input:focus, .input-group select:focus { border-color: var(--primary-green); box-shadow: 0 0 0 3px var(--primary-green-light); }
        .btn-primary.auth-btn { width: 100%; background-color: var(--primary-green); color: white; padding: 14px; border: none; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: background-color 0.2s; margin-top: 10px; }
        .btn-primary.auth-btn:hover { background-color: var(--primary-green-hover); }
        .auth-footer { text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-muted); }
        .auth-footer a { color: var(--primary-green); font-weight: 600; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body class="auth-body">

    <div class="auth-card">
        <div class="logo-center"> StudyPlaner</div>
        <h2>Create Account</h2>
        <p class="auth-subtitle">Start studying smarter today.</p>

        <form action="onboarding.html">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Kalpana Sree" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="student@example.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password" required>
            </div>

            <div class="input-group">
                <label for="level">Study Level</label>
                <select id="level" required>
                    <option value="" disabled selected>Select your level...</option>
                    <option value="highschool">High School</option>
                    <option value="college">College / University</option>
                     <option value="college">Mid Exams</option>
                      <option value="college">Sem Exams</option>
                    <option value="competitive">Competitive Exams</option>
                </select>
            </div>

            <button type="submit" class="btn-primary auth-btn">Create Account</button>
        </form>

        <p class="auth-footer">Already have an account? <a href="login.html">Log In</a></p>
    </div>

</body>
</html>
