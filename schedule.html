<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Schedule | AI Study Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="dashboard.css">
    
    <style>
        /* --- CALENDAR SPECIFIC STYLES --- */
        .calendar-container {
            background: var(--card-bg, #ffffff);
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-top: 10px;
        }

        .calendar-header {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
        }

        .calendar-header h2 {
            font-size: 1.25rem;
            color: var(--text-main);
        }

        .calendar-header-info {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* 7 Columns for the 7 days of the week */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: #e2e8f0; /* The "Border" color between days */
        }

        .day-label {
            background: #f8fafc;
            padding: 12px 10px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .cal-day {
            background: white;
            min-height: 120px;
            padding: 12px;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .cal-day:hover { background: #fcfdfd; }

        .date-num {
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 4px;
            display: block;
        }

        .inactive { background: #fdfdfd; opacity: 0.5; }
        
        /* Today Highlight using Thick Green Theme */
        .today { background: #dcfce7 !important; } /* Light green background */
        .today .date-num { color: #15803d; font-weight: 800; } /* Thick green text */

        /* Event Tags */
        .event {
            font-size: 10px;
            padding: 5px 8px;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            text-align: left;
        }
        
        .event:hover { opacity: 0.8; }
        
        /* Event Colors */
        .blue { background: #3b82f6; } 
        .green { background: #15803d; } /* Matches your thick green */
        .red { background: #ef4444; }
        .yellow { background: #f59e0b; color: #fff; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-logo"> StudyPlaner</div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><span>📊</span> Dashboard</a>
                <a href="schedule.html" class="active"><span>📅</span> My Schedule</a>
                <a href="subjects.html"><span>📚</span> Subjects</a>
                <a href="analytics.html"><span>📈</span> Analytics</a>
                <a href="settings.html"><span>⚙️</span> Settings</a>
            </nav>
            <div class="sidebar-bottom">
                <a href="login.html" class="logout-btn"><span>🚪</span> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="greeting">
                    <h1>My Schedule 📅</h1>
                    <p>Full month view for October 2026.</p>
                </div>
                <div class="user-profile">
                    <button class="btn-primary" onclick="location.reload()">✨ Regenerate Plan</button>
                    <div class="avatar">K</div>
                </div>
            </header>

            <section class="calendar-container">
                <div class="calendar-header">
                    <h2>October 2026</h2>
                    <div class="calendar-header-info">Standard 4h/day Plan</div>
                </div>
                
                <div class="calendar-grid" style="border-bottom: 1px solid #e2e8f0;">
                    <div class="day-label">Sun</div><div class="day-label">Mon</div>
                    <div class="day-label">Tue</div><div class="day-label">Wed</div>
                    <div class="day-label">Thu</div><div class="day-label">Fri</div>
                    <div class="day-label">Sat</div>
                </div>

                <div class="calendar-grid" id="full-month-grid">
                    <div style="padding: 20px; grid-column: 1 / -1; text-align: center; color: #64748b;">Loading your schedule...</div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Using DOMContentLoaded ensures the HTML is fully loaded before JS runs
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('full-month-grid');
            
            // We will build the entire HTML string first, then inject it once.
            let calendarHTML = ''; 

            // 1. Fill the 4 inactive days from September (27-30)
            for (let i = 27; i <= 30; i++) {
                calendarHTML += `<div class="cal-day inactive"><span class="date-num">${i}</span></div>`;
            }

            // 2. Fill the 31 days of October
            for (let day = 1; day <= 31; day++) {
                let isToday = (day === 10) ? 'today' : '';
                let eventsHtml = '';
                
                // Logic: Add Calculus on Mondays/Wednesdays
                if (day % 7 === 1 || day % 7 === 3) {
                    eventsHtml += `<div class="event blue">Calculus (2h)</div>`;
                } 
                // Logic: Add Physics on Tuesdays/Thursdays
                if (day % 7 === 2 || day % 7 === 4) {
                    eventsHtml += `<div class="event green">Physics (2h)</div>`;
                }

                // Logic: Mark Day 10 as Missed (Today)
                if (day === 10) {
                    eventsHtml += `<div class="event red">⚠️ Missed CompSci</div>`;
                }

                // Logic: Exam on the 14th
                if (day === 14) {
                    eventsHtml += `<div class="event yellow">⭐ CALCULUS EXAM ⭐</div>`;
                }

                calendarHTML += `
                    <div class="cal-day ${isToday}">
                        <span class="date-num">${day}</span>
                        ${eventsHtml}
                    </div>
                `;
            }

            // Finally, push all the HTML into the grid at once
            grid.innerHTML = calendarHTML;
        });
    </script>
</body>
</html>
