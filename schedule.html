<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Schedule | AI Study Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    
    <style>
        .calendar-container {
            background: white;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .calendar-header {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
        }

        /* 7 Columns for the 7 days of the week */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: #e2e8f0; /* The "Border" color */
        }

        .day-label {
            background: #f8fafc;
            padding: 10px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
        }

        .cal-day {
            background: white;
            min-height: 120px;
            padding: 12px;
            transition: 0.2s;
        }

        .cal-day:hover { background: #fcfdfd; }

        .date-num {
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 8px;
            display: block;
        }

        .inactive { background: #fdfdfd; opacity: 0.5; }
        .today { background: #f0fdf4 !important; }
        .today .date-num { color: #2e7d12; font-weight: 800; }

        /* Event Tags */
        .event {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 6px;
            color: white;
            margin-top: 4px;
            font-weight: 600;
            cursor: pointer;
        }
        .blue { background: #3b82f6; }
        .green { background: #10b981; }
        .red { background: #ef4444; }
        .yellow { background: #f59e0b; color: #fff; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">StudyPlanner</div>
            <nav class="sidebar-nav">
                <a href="dashboard.html">📊 Dashboard</a>
                <a href="schedule.html" class="active">📅 My Schedule</a>
                <a href="subjects.html">📚 Subjects</a>
                <a href="analytics.html">📈 Analytics</a>
                <a href="settings.html">⚙️ Settings</a>
            </nav>
            <div class="sidebar-bottom">
                <a href="login.html" class="logout-btn">🚪 Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div>
                    <h1>My Schedule 📅</h1>
                    <p style="color: var(--text-gray);">Full month view for October 2026.</p>
                </div>
                <button class="magic-btn" onclick="location.reload()">✨ Regenerate Plan</button>
            </header>

            <section class="calendar-container">
                <div class="calendar-header">
                    <h2 style="font-size: 1.25rem;">October 2026</h2>
                    <div style="color: var(--text-gray); font-weight: 600;">Standard 4h/day Plan</div>
                </div>
                
                <div class="calendar-grid" style="background: none; border-bottom: 1px solid #e2e8f0;">
                    <div class="day-label">Sun</div><div class="day-label">Mon</div>
                    <div class="day-label">Tue</div><div class="day-label">Wed</div>
                    <div class="day-label">Thu</div><div class="day-label">Fri</div>
                    <div class="day-label">Sat</div>
                </div>

                <div class="calendar-grid" id="full-month-grid">
                    </div>
            </section>
        </main>
    </div>

    <script>
        const grid = document.getElementById('full-month-grid');

        function generateMonth() {
            // 1. Fill the 4 inactive days from September (27-30)
            for (let i = 27; i <= 30; i++) {
                grid.innerHTML += `<div class="cal-day inactive"><span class="date-num">${i}</span></div>`;
            }

            // 2. Fill the 31 days of October
            for (let day = 1; day <= 31; day++) {
                let isToday = (day === 10) ? 'today' : '';
                
                let eventsHtml = '';
                // Logic: Add Math on Mondays/Wednesdays, Physics on Tuesdays/Thursdays
                if (day % 7 === 1 || day % 7 === 3) {
                    eventsHtml = `<div class="event blue">Calculus (2h)</div>`;
                } else if (day % 7 === 2 || day % 7 === 4) {
                    eventsHtml = `<div class="event green">Physics (2h)</div>`;
                }

                // Logic: Mark Day 10 as Missed (Today)
                if (day === 10) {
                    eventsHtml += `<div class="event red">⚠️ Missed CompSci</div>`;
                }

                // Logic: Exam on the 14th
                if (day === 14) {
                    eventsHtml = `<div class="event yellow">⭐ CALCULUS EXAM ⭐</div>`;
                }

                grid.innerHTML += `
                    <div class="cal-day ${isToday}">
                        <span class="date-num">${day}</span>
                        ${eventsHtml}
                    </div>
                `;
            }
        }

        // Run the function when the page loads
        window.onload = generateMonth;
    </script>
</body>
</html>
